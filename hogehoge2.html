<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>My first three.js app</title>
		<style>
			body { margin: 0; }
			canvas { display: block; }
		</style>
	</head>
	<body>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/105/three.min.js"></script>
		<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r106/examples/js/loaders/TGALoader.js"></script>
		<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r106/examples/js/libs/mmdparser.min.js"></script>
  		<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r106/examples/js/loaders/MMDLoader.js"></script>
		<script>
			// Our Javascript will go here.
	
			console.log("ﾄﾞｯ！");
			//シーンを用意
			var scene = new THREE.Scene();
			//光源を用意してシーンに追加
			const ambient = new THREE.AmbientLight(0xeeeeee);
  			scene.add(ambient);
  			//カメラの場所 (画角、縦横比、写す手前と後ろの限界)
			var camera = new THREE.PerspectiveCamera( 75, window.innerWidth / window.innerHeight, 0.1, 1000 );
			//カメラの場所（右手座標系）
			camera.position.x = 2;
			camera.position.y = -2;
			camera.position.z = 50;
			
			//描画するシステムを用意
			var renderer = new THREE.WebGLRenderer();
			//描画サイズをwindowサイズに
			renderer.setSize( window.innerWidth, window.innerHeight );
			document.body.appendChild( renderer.domElement );
			

			// Instantiate a loader
			var loader = new THREE.MMDLoader();
			var seiten;
			var mesh_loaded = 0;
			// Load a MMD model
			loader.load(
				// path to PMD/PMX file
				'./models/seiten_ver112/斉天大聖ver1.12.pmx',
				// called when the resource is loaded
				function ( mesh ) {
					seiten = mesh;
					scene.add( seiten );
					mesh_loaded +=1;
				},
				// called when loading is in progresses
				function ( xhr ) {
					console.log( ( xhr.loaded / xhr.total * 100 ) + '% loaded' );
				},
				// called when loading has errors
				function ( error ) {
					console.log( 'An error happened' );
				}
			);


			
			clock = new THREE.Clock();
			function animate() {
				window.requestAnimationFrame( animate );
				var delta = clock.getDelta();
				if(mesh_loaded){
					seiten.rotation.x += delta * THREE.Math.degToRad( 20 );
					seiten.rotation.y += delta * THREE.Math.degToRad( 20 );
					renderer.render( scene, camera );
				}
			}
			
			animate();
		</script>
	</body>
</html>
