<html>
	<head>
		<meta charset="utf-8">
		<title>windowの名前</title>
		<style>
			body { margin: 0; }
			canvas { display: block; }
		</style>
	</head>
	<body>

		<p>WASDで動きます。SHIFT+WASDでダッシュ、クリックで視点移動</p>

		<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/106/three.min.js"></script>

		<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r106/examples/js/libs/mmdparser.min.js"></script>
		<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r103/examples/js/libs/ammo.js"></script>
		<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r106/examples/js/loaders/TGALoader.js"></script>
		<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r106/examples/js/loaders/MMDLoader.js"></script>
		<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r106/examples/js/animation/MMDAnimationHelper.js"></script>
		<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r106/examples/js/effects/OutlineEffect.js"></script>
		<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r106/examples/js/animation/CCDIKSolver.js"></script>
		<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r106/examples/js/animation/MMDPhysics.js"></script>

		
		<script src="Common.js"></script>
		<script src="keyCallBack.js"></script>
		<script src="playerAction.js"></script>
		<script>
			// Our Javascript will go here.
			console.log("ﾄﾞｯ！");
			//シーンを用意
			var scene = new THREE.Scene();
			//光源を用意してシーンに追加
			const ambient = new THREE.AmbientLight(0xeeeeee);
  			scene.add(ambient);
  			//カメラの場所 (画角、縦横比、写す手前と後ろの限界)
			var camera = new THREE.PerspectiveCamera( 75, window.innerWidth / window.innerHeight, 0.1, 1000 );
			//カメラの場所（右手座標系）
			camera.position.x = 0;
			camera.position.y = 2;
			camera.position.z = 5;
			
			//描画するシステムを用意
			var renderer = new THREE.WebGLRenderer( { antialias: true } );;
			//描画サイズをwindowサイズに
			renderer.setSize( window.innerWidth, window.innerHeight );
			document.body.appendChild( renderer.domElement );
			
			// 箱の形を用意
			var geometry = new THREE.BoxGeometry();
			// 表面の素材を用意
			var material = new THREE.MeshBasicMaterial( { color: 0x00ff00 } );
			// 形と素材を指定した cubeをつくってシーンに追加
			var cube = new THREE.Mesh( geometry, material );
			//scene.add( cube );
			// 床グリッドを追加
			var gridHelper = new THREE.GridHelper(500, 100);
			scene.add(gridHelper);
			
			
			// pmd/pmxファイルの読み込み
			var miku;
			var mesh_loaded = 0;
				
			// Load a MMD model
			//modelFile = './models/seiten_ver112/斉天大聖ver1.12.pmx';
			modelFile = 'https://cdn.rawgit.com/mrdoob/three.js/r87/examples/models/mmd/miku/miku_v2.pmd';
			
			// モーションファイル (vmd:Vocaloid Motion Data)
			var motionFiles = [
				{filePath : './vmd/ゆきはね式モーションパックver1.1.1/歩く/歩く：17式ミクx10.vmd', 
				physics : true, ik: true, aniClip : null, warmup : 6 },	
				{filePath : './vmd/ゆきはね式モーションパックver1.1.1/走る/走る：大妖精1（個性のある走り）x10.vmd',  
				physics : true, ik: true, aniClip : null, warmup : 3 },
				{filePath : './vmd/Lat式移動モーション配布v1.3/3.ジャンプ・落下・アクロバット/1.段差に飛び乗る/2.ジャンプ_(11f_上移動3~10の間_前移動0~10の間).vmd',  
				physics : true, ik: true, aniClip : null, warmup : 5 }
			];
	
			// load のためのオブジェクトを作る
			const loader = new THREE.MMDLoader(); 
			var helper = new THREE.MMDAnimationHelper({ afterglow: 2.0, resetPhysicsOnLoop: true });
			var helpers = [];		
			// ロード部分本体
			loader.load( modelFile, function (mesh) {
				// モデルファイルの読み込み
		        miku = mesh;
		        
				// モーションファイル(vmd:Vocaloid Motion Data)
		        LoadVmd( 2, miku );
		        LoadVmd( 0, miku );
		        LoadVmd( 1, miku );

		        scene.add( miku );
		        
				mesh_loaded +=1;
				console.log(miku);
		        
		    }, onProgress, onError);
			
			// モーションファイル読み込み
			function LoadVmd( motionId, mesh ){
				vmdPath = motionFiles[motionId].filePath;
				// アニメーションファイルを読み込む
				loader.loadAnimation(vmdPath, mesh, function(vmd){
					// motion helper を用意する
					helpers[motionId] = new THREE.MMDAnimationHelper({ afterglow: 2.0, resetPhysicsOnLoop: true });
					// セットするmotionを保持しておく
					motionFiles[motionId].aniClip= vmd;
					
					// animationをいったん止める
					helpers[motionId].enable( 'animation', false );
					helpers[motionId].enable( 'cameraAnimation', false );
					
					// motionをセットする
					helpers[motionId].add(mesh,{
				      animation: vmd,
				      physics: motionFiles[motionId].physics,
				      warmup  : motionFiles[motionId].warmup,
				      unitStep : 1/120
				    });
				    // animationをtrueに
				    helpers[motionId].enable( 'animation', true);	    
				    helpers[motionId].enable( 'ik', motionFiles[motionId].ik );
				    
				    // インバースキネマティクス(IK)の bone連動
				    
				    ikHelper = helpers[motionId].objects.get( mesh ).ikSolver.createHelper();
					ikHelper.visible = false;
					scene.add( ikHelper );
			
					// 物理演算の helper
					if (motionFiles[motionId].physics){
						physicsHelper = helpers[motionId].objects.get( mesh ).physics.createHelper();
						physicsHelper.visible = false;
						scene.add( physicsHelper );
					}
					
					console.log(helpers[motionId])
				}, onProgress, onError);
				return true;
			}

			//MMD loading progress
			function onProgress( xhr ) {
			  if ( xhr.lengthComputable ) {
			    let percentComplete = xhr.loaded / xhr.total * 100;
			    console.log( Math.round( percentComplete, 2 ) + '% downloaded' );
			  }
			};

			// Error MMD Load
			function onError( xhr ) {
			};
			

			// player という名前で作ったobject を1つ用意する
			player = new MyAgent();
			player.offsetRotationRight = THREE.Math.degToRad( 90 );
			

			
			//カメラの再設置
			function cameraUpDate(agent) {
				// カメラの場所をプレイヤーの後ろに
				camera.position.x = agent.position.x -agent.viewVect.x *35;
				camera.position.y = agent.position.y -agent.viewVect.y *35+30;
				camera.position.z = agent.position.z -agent.viewVect.z *35;
				// プレイヤーの方向を向く
				camera.lookAt( agent.position);
			}
			
			
			
			// 時計
			clock = new THREE.Clock();
			function animate() {
				window.requestAnimationFrame( animate );
				// 現在の1フレームの長さを取得
				var frameTime = Math.min(clock.getDelta(), 0.3);
				if(mesh_loaded>0){
					userMove(frameTime, miku, player);
					
					if(player.isStop==0 ){
						// motionが切り替わった時
						if(player.lastMotion != selectmotion){
							 let mixer = helpers[selectmotion].objects.get( miku ).mixer;
							 let action = mixer.existingAction( motionFiles[selectmotion].aniClip );
							 action.reset();
						}
						
						helpers[selectmotion].update( frameTime );
						player.lastMotion = selectmotion;
					}
					cameraUpDate(player);
					
				}
				// シーンを描画
				renderer.render( scene, camera );
			}
			animate();
			
			
					 
   
		</script>
		<script src="mouseCallBack.js"></script>
	</body>
</html>
